<!DOCTYPE html>
<html>
<head>
    <title>Электронный Дневник Kiosk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Важно, чтобы избежать скролла */
            position: relative; /* Для позиционирования дочерних элементов */
            -webkit-user-select: none; /* Запрет выделения текста на iOS */
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #figma-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; /* iFrame занимает всю доступную высоту */
            border: none;
            z-index: 1; /* iFrame должен быть под элементом-накладкой */
        }

        #cover-div {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px; /* Высота плашки, можно подстроить */
            background-color: #FFFFFF; /* Белый цвет для перекрытия */
            z-index: 2; /* Накладка должна быть над iFrame */
        }
    </style>
</head>
<body>

    <iframe id="figma-frame" src="https://truck-kite-08663967.figma.site"></iframe>

    <div id="cover-div"></div>

</body>
</html>
