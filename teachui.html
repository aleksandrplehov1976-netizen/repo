<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>АИАС АВЕРС - Учитель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Roboto, sans-serif;
            background: #f0f0f0;
            padding: 12px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #bbb;
            margin-bottom: 16px;
            padding: 14px;
        }

        .card-header {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        .list-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 12px;
            border: 1px solid #aaa;
            background: white;
            font-size: 14px;
        }

        button, .btn {
            background: #e0e0e0;
            border: 1px solid #999;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px 0;
        }

        .btn-primary {
            background: #000;
            border-color: #000;
            color: white;
        }

        .btn-danger {
            background: #c00;
            border-color: #c00;
            color: white;
        }

        .btn-small {
            padding: 4px 10px;
            font-size: 12px;
        }

        .error {
            color: #c00;
            margin: 8px 0;
        }

        .success {
            color: #070;
        }

        .badge {
            background: #ddd;
            padding: 2px 8px;
            font-size: 12px;
        }

        .grade-5 { color: #070; font-weight: bold; }
        .grade-4 { color: #390; }
        .grade-3 { color: #960; }
        .grade-2 { color: #c00; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-content {
            background: white;
            border: 2px solid #000;
            max-width: 400px;
            width: 90%;
            padding: 16px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .hidden {
            display: none;
        }

        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
        .text-center { text-align: center; }
        .tab {
            display: inline-block;
            padding: 8px 16px;
            margin-right: 4px;
            cursor: pointer;
            background: #ddd;
            border: 1px solid #aaa;
        }
        .tab.active {
            background: #000;
            color: white;
            border-color: #000;
        }
        .tabs {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <div class="card" style="margin-top: 50px;">
        <div class="card-header">🔐 Вход в систему</div>
        <input type="text" id="loginEmail" placeholder="Логин" value="teachQ">
        <input type="password" id="loginPassword" placeholder="Пароль" value="teachQp">
        <button id="loginBtn" class="btn-primary">Войти</button>
        <div id="loginError" class="error"></div>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="container">
        <div class="card" style="padding: 8px 14px;">
            <div class="flex">
                <span>👋 <span id="userName"></span> (<span id="userRole"></span>)</span>
                <button id="logoutBtn" class="btn-small">Выход</button>
            </div>
        </div>

        <div class="tabs">
            <span class="tab" data-tab="students">👨‍🎓 Ученики</span>
            <span class="tab" data-tab="schedule">📅 Расписание</span>
            <span class="tab" data-tab="grades">⭐ Оценки</span>
            <span class="tab" data-tab="canteen">🍽️ Столовая</span>
            <span class="tab" data-tab="messages">💬 Сообщения</span>
        </div>

        <!-- Ученики -->
        <div id="tabStudents" class="tab-content">
            <div class="card">
                <div class="card-header">📚 Класс</div>
                <select id="classSelect" onchange="changeClass()"></select>
            </div>
            <div class="card">
                <div class="card-header">👨‍🎓 Ученики класса</div>
                <div id="studentsList"></div>
            </div>
        </div>

        <!-- Расписание -->
        <div id="tabSchedule" class="tab-content hidden">
            <div class="card">
                <div class="card-header">📅 Расписание уроков</div>
                <select id="scheduleClassSelect" onchange="changeScheduleClass()"></select>
                <div id="scheduleList"></div>
                <button id="addScheduleBtn" class="btn">➕ Добавить урок</button>
                <button id="copyScheduleBtn" class="btn">📋 Копировать из другого класса</button>
            </div>
            <div class="card">
                <div class="card-header">📝 Темы и Д/З</div>
                <input type="date" id="lessonDate" onchange="loadLessonsByDate()">
                <div id="lessonsList"></div>
            </div>
            <div class="card">
                <div class="card-header">⏰ Перемены</div>
                <div id="breaksList"></div>
                <button id="addBreakBtn" class="btn">➕ Добавить перемену</button>
            </div>
        </div>

        <!-- Оценки -->
        <div id="tabGrades" class="tab-content hidden">
            <div class="card">
                <div class="card-header">⭐ Управление оценками</div>
                <select id="gradesClassSelect" onchange="changeGradesClass()"></select>
                <select id="studentSelect" onchange="selectStudent()">
                    <option value="">-- Выберите ученика --</option>
                </select>
                <div id="gradesList"></div>
                <div class="card">
                    <div class="card-header">➕ Новая оценка</div>
                    <select id="subjectSelect"></select>
                    <input type="number" id="newGrade" placeholder="Оценка (1-5)" min="1" max="5">
                    <input type="date" id="newGradeDate">
                    <input type="text" id="newGradeComment" placeholder="Комментарий">
                    <button id="setGradeBtn" class="btn-primary">Выставить</button>
                </div>
            </div>
        </div>

        <!-- Столовая -->
        <div id="tabCanteen" class="tab-content hidden">
            <div class="card">
                <div class="card-header">🍽️ Меню столовой</div>
                <input type="date" id="menuDate" onchange="loadMenu()">
                <div id="menuList"></div>
                <div class="card">
                    <div class="card-header">➕ Добавить блюдо</div>
                    <input type="text" id="newDishName" placeholder="Название">
                    <input type="number" id="newDishPrice" placeholder="Цена">
                    <input type="text" id="newDishDesc" placeholder="Описание">
                    <div class="grid-2">
                        <input type="number" id="newDishKkal" placeholder="Ккал">
                        <input type="number" id="newDishProtein" placeholder="Белки">
                        <input type="number" id="newDishFat" placeholder="Жиры">
                        <input type="number" id="newDishCarbs" placeholder="Углеводы">
                    </div>
                    <button id="addDishBtn" class="btn-primary">Добавить</button>
                </div>
            </div>
            <div class="card">
                <div class="card-header">📋 Заказы учеников</div>
                <div id="ordersList"></div>
            </div>
        </div>

        <!-- Сообщения -->
        <div id="tabMessages" class="tab-content hidden">
            <div class="card">
                <div class="card-header">💬 Диалоги с учениками</div>
                <div id="dialogsList"></div>
            </div>
            <div id="chatBox" class="card hidden">
                <div class="flex">
                    <div class="card-header">💬 <span id="chatWith"></span></div>
                    <button id="closeChatBtn" class="btn-small">Закрыть</button>
                </div>
                <div id="chatMessages" style="max-height: 300px; overflow-y: auto; margin-bottom: 10px;"></div>
                <textarea id="newMessageBody" rows="2" placeholder="Сообщение..."></textarea>
                <button id="sendMessageBtn" class="btn-primary">Отправить</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzE-zWHJztk7Tjby3RXqo3eRYduLzwPXobfn6UF13yQzeGok0tWzWhXkvvs65U2O0pO/exec';
    
    let token = null;
    let userRole = null;
    let userId = null;
    let currentClassId = null;
    let currentStudentId = null;
    let currentChatUserId = null;
    let allClasses = [];
    let allStudents = [];
    let allSubjects = [];

    async function callApi(fn, args = []) {
        const params = new URLSearchParams();
        params.append('fn', fn);
        params.append('args', JSON.stringify(args));
        const resp = await fetch(`${API_URL}?${params.toString()}`);
        return resp.json();
    }

    async function callApiAuth(fn, extraArgs = []) {
        if (!token) throw new Error('Нет сессии');
        return callApi(fn, [token, ...extraArgs]);
    }

    async function login() {
        const loginVal = document.getElementById('loginEmail').value;
        const passVal = document.getElementById('loginPassword').value;
        const res = await callApi('login', [loginVal, passVal]);
        if (res.success) {
            token = res.token;
            userRole = res.role;
            userId = res.userId;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').innerText = res.name;
            document.getElementById('userRole').innerText = res.role === 'teacher' ? 'Учитель' : 'Директор';
            await loadClasses();
            showTab('students');
        } else {
            document.getElementById('loginError').innerText = res.error;
        }
    }

    async function loadClasses() {
        const res = await callApiAuth('getAllClasses', []);
        if (res.success) {
            allClasses = res.data;
            if (allClasses.length > 0) {
                currentClassId = allClasses[0].id;
                renderClassSelectors();
                await loadStudents();
            }
        }
    }

    function renderClassSelectors() {
        const options = allClasses.map(c => `<option ${currentClassId === c.id ? 'selected' : ''} value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('classSelect').innerHTML = options;
        document.getElementById('scheduleClassSelect').innerHTML = options;
        document.getElementById('gradesClassSelect').innerHTML = options;
    }

    async function loadStudents() {
        if (!currentClassId) return;
        const res = await callApiAuth('getClassStudents', [currentClassId]);
        if (res.success) {
            allStudents = res.data;
            const container = document.getElementById('studentsList');
            container.innerHTML = allStudents.map(s => `
                <div class="list-item flex">
                    <div>
                        <strong>${s.name}</strong><br>
                        <span style="font-size:12px;">${s.email || ''}</span>
                    </div>
                    <div>
                        <button class="btn-small" onclick="openStudentChat('${s.id}', '${s.name}')">💬</button>
                    </div>
                </div>
            `).join('');
            
            const studentSelect = document.getElementById('studentSelect');
            studentSelect.innerHTML = '<option value="">-- Выберите ученика --</option>' + allStudents.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
    }

    async function loadSchedule() {
        if (!currentClassId) return;
        const res = await callApiAuth('getSchedule', [currentClassId]);
        if (res.success) {
            const days = {1:'ПН',2:'ВТ',3:'СР',4:'ЧТ',5:'ПТ',6:'СБ'};
            const byDay = {};
            res.data.forEach(s => {
                if (!byDay[s.dayOfWeek]) byDay[s.dayOfWeek] = [];
                byDay[s.dayOfWeek].push(s);
            });
            const container = document.getElementById('scheduleList');
            container.innerHTML = Object.entries(byDay).sort().map(([day, lessons]) => `
                <div class="card" style="margin-bottom:8px; padding:10px;">
                    <div class="card-header" style="margin-bottom:4px;">${days[day] || day}</div>
                    ${lessons.sort((a,b)=>+a.lessonNumber - +b.lessonNumber).map(l => `
                        <div class="list-item flex">
                            <div><strong>${l.lessonNumber}</strong> ${l.subjectName}<br><small>${l.startTime}-${l.endTime} | ${l.room}</small></div>
                            <button class="btn-small btn-danger" onclick="deleteScheduleItem('${l.id}')">🗑️</button>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }
    }

    async function loadSubjectsForClass() {
        if (!currentClassId) return;
        const res = await callApiAuth('getSubjects', [currentClassId]);
        if (res.success) {
            allSubjects = res.data;
            const subjectSelect = document.getElementById('subjectSelect');
            subjectSelect.innerHTML = allSubjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }
    }

    async function selectStudent() {
        const select = document.getElementById('studentSelect');
        currentStudentId = select.value;
        if (currentStudentId) {
            await loadStudentGrades();
        }
    }

    async function loadStudentGrades() {
        if (!currentStudentId) return;
        const res = await callApiAuth('getStudentGrades', [currentStudentId]);
        if (res.success) {
            const grouped = {};
            res.data.forEach(g => {
                if (!grouped[g.subjectName]) grouped[g.subjectName] = [];
                grouped[g.subjectName].push(g);
            });
            const container = document.getElementById('gradesList');
            container.innerHTML = Object.entries(grouped).map(([subject, grades]) => `
                <div class="card" style="margin-bottom:8px;">
                    <div class="card-header">${subject}</div>
                    ${grades.map(g => `
                        <div class="list-item flex">
                            <div>
                                <span class="grade-${g.grade}"><strong>${g.grade}</strong></span> - ${g.date}
                                <br><small>${g.comment || ''}</small>
                            </div>
                            <div>
                                <button class="btn-small" onclick="editGradeItem('${g.id}', ${g.grade}, '${g.comment || ''}')">✏️</button>
                                <button class="btn-small btn-danger" onclick="deleteGradeItem('${g.id}')">🗑️</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            await loadSubjectsForClass();
        }
    }

    async function setGrade() {
        if (!currentStudentId) { alert('Выберите ученика'); return; }
        const subjectId = document.getElementById('subjectSelect').value;
        if (!subjectId) { alert('Выберите предмет'); return; }
        const grade = document.getElementById('newGrade').value;
        const date = document.getElementById('newGradeDate').value || new Date().toISOString().split('T')[0];
        const comment = document.getElementById('newGradeComment').value;
        if (!grade || grade < 1 || grade > 5) { alert('Оценка от 1 до 5'); return; }
        await callApiAuth('setGrade', [currentStudentId, subjectId, grade, date, comment]);
        await loadStudentGrades();
        document.getElementById('newGrade').value = '';
        document.getElementById('newGradeComment').value = '';
    }

    async function loadBreaks() {
        const res = await callApiAuth('getBreaks', []);
        if (res.success) {
            const container = document.getElementById('breaksList');
            container.innerHTML = res.data.map(b => `
                <div class="list-item flex">
                    <div>После ${b.afterLesson} урока - ${b.name} (${b.durationMinutes} мин)</div>
                    <div>
                        <button class="btn-small" onclick="editBreakItem('${b.id}', ${b.durationMinutes}, '${b.name}')">✏️</button>
                        <button class="btn-small btn-danger" onclick="deleteBreakItem('${b.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function loadMenu() {
        const date = document.getElementById('menuDate').value || new Date().toISOString().split('T')[0];
        const res = await callApiAuth('getMenuByDate', [date]);
        if (res.success) {
            const container = document.getElementById('menuList');
            container.innerHTML = res.data.map(m => `
                <div class="list-item">
                    <div class="flex">
                        <strong>${m.name}</strong>
                        <span>💰 ${m.price} руб</span>
                    </div>
                    <div style="font-size:12px;">${m.description || ''}</div>
                    <div style="font-size:11px;">🔥 ${m.calories} ккал | 🥩 ${m.protein}г | 🧈 ${m.fat}г | 🍚 ${m.carbs}г</div>
                    <div class="flex mt-2">
                        <button class="btn-small" onclick="editMenuItem('${m.id}')">✏️</button>
                        <button class="btn-small btn-danger" onclick="deleteMenuItem('${m.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function loadOrders() {
        const res = await callApiAuth('getOrders', []);
        if (res.success) {
            const container = document.getElementById('ordersList');
            container.innerHTML = res.data.map(o => `
                <div class="list-item">
                    <div class="flex">
                        <strong>${o.userName}</strong>
                        <select onchange="updateOrderStatus('${o.id}', this.value)">
                            <option ${o.status === 'pending' ? 'selected' : ''}>pending</option>
                            <option ${o.status === 'confirmed' ? 'selected' : ''}>confirmed</option>
                            <option ${o.status === 'ready' ? 'selected' : ''}>ready</option>
                            <option ${o.status === 'completed' ? 'selected' : ''}>completed</option>
                        </select>
                    </div>
                    <div>${o.menuName} x${o.quantity} = ${o.total} руб</div>
                    <div style="font-size:12px;">${o.orderDate}</div>
                </div>
            `).join('');
        }
    }

    async function loadDialogs() {
        const res = await callApiAuth('getDialogs', []);
        if (res.success) {
            const studentsOnly = res.data.filter(d => d.userRole === 'student');
            const container = document.getElementById('dialogsList');
            container.innerHTML = studentsOnly.map(d => `
                <div class="list-item flex" onclick="openChat('${d.userId}', '${d.userName}')">
                    <div>
                        <strong>${d.userName}</strong>
                        <div style="font-size:12px;">${d.lastMessage?.substring(0, 50) || ''}</div>
                    </div>
                    ${d.unreadCount > 0 ? `<span class="badge">${d.unreadCount}</span>` : ''}
                </div>
            `).join('');
        }
    }

    async function openStudentChat(studentId, studentName) {
        currentChatUserId = studentId;
        document.getElementById('chatWith').innerText = studentName;
        document.getElementById('chatBox').classList.remove('hidden');
        const res = await callApiAuth('getMessages', [studentId]);
        if (res.success) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = res.data.map(m => `
                <div style="margin: 5px 0; text-align: ${m.fromId === studentId ? 'left' : 'right'}">
                    <div style="display:inline-block; background:${m.fromId === studentId ? '#eee' : '#000'}; color:${m.fromId === studentId ? '#000' : '#fff'}; padding: 6px 10px; border:1px solid #aaa;">
                        <strong>${m.fromName}:</strong> ${m.body}
                        <div style="font-size:10px;">${m.date?.split('T')[0]}</div>
                    </div>
                </div>
            `).join('');
            await callApiAuth('markMessagesRead', [studentId]);
        }
    }

    async function sendMessageToStudent() {
        const body = document.getElementById('newMessageBody').value;
        if (!body.trim()) { alert('Введите сообщение'); return; }
        await callApiAuth('sendMessage', [currentChatUserId, 'Личное сообщение', body]);
        document.getElementById('newMessageBody').value = '';
        await openStudentChat(currentChatUserId, document.getElementById('chatWith').innerText);
        await loadDialogs();
    }

    async function loadLessonsByDate() {
        const date = document.getElementById('lessonDate').value || new Date().toISOString().split('T')[0];
        const res = await callApiAuth('getLessonsByDate', [currentClassId, date]);
        if (res.success) {
            const container = document.getElementById('lessonsList');
            container.innerHTML = res.data.map(l => `
                <div class="list-item">
                    <div class="flex">
                        <span><strong>${l.lessonNumber}</strong> ${l.subjectName}</span>
                        <button class="btn-small" onclick="editLessonItem('${l.scheduleId}', '${date}', '${l.topic}', '${l.homework}')">✏️</button>
                    </div>
                    <div>📖 Тема: ${l.topic || '-'}</div>
                    <div>📝 Д/З: ${l.homework || '-'}</div>
                </div>
            `).join('');
        }
    }

    // CRUD операции
    async function deleteScheduleItem(id) {
        if (!confirm('Удалить урок?')) return;
        await callApiAuth('deleteSchedule', [id]);
        await loadSchedule();
    }

    async function deleteBreakItem(id) {
        await callApiAuth('deleteBreak', [id]);
        await loadBreaks();
    }

    async function editBreakItem(id, duration, name) {
        const newDuration = prompt('Длительность (мин):', duration);
        const newName = prompt('Название:', name);
        await callApiAuth('updateBreak', [id, newDuration, newName]);
        await loadBreaks();
    }

    async function editGradeItem(id, grade, comment) {
        const newGrade = prompt('Оценка (1-5):', grade);
        const newComment = prompt('Комментарий:', comment);
        await callApiAuth('updateGrade', [id, newGrade, newComment]);
        await loadStudentGrades();
    }

    async function deleteGradeItem(id) {
        if (!confirm('Удалить оценку?')) return;
        await callApiAuth('deleteGrade', [id]);
        await loadStudentGrades();
    }

    async function editLessonItem(scheduleId, date, topic, homework) {
        const newTopic = prompt('Тема:', topic);
        const newHomework = prompt('Домашнее задание:', homework);
        await callApiAuth('setLesson', [scheduleId, date, newTopic, newHomework]);
        await loadLessonsByDate();
    }

    async function addSchedule() {
        const day = prompt('День (1-ПН,2-ВТ,3-СР,4-ЧТ,5-ПТ):');
        const lessonNum = prompt('Номер урока:');
        const subjectId = prompt('ID предмета (см. список предметов):');
        const room = prompt('Кабинет:');
        const start = prompt('Начало (08:30):');
        const end = prompt('Конец (09:15):');
        await callApiAuth('setSchedule', [currentClassId, day, lessonNum, subjectId, room, start, end]);
        await loadSchedule();
    }

    async function copySchedule() {
        const fromClass = prompt('ID класса-источника:');
        if (fromClass) {
            await callApiAuth('copyScheduleWeek', [fromClass, currentClassId, 0]);
            await loadSchedule();
        }
    }

    async function addBreak() {
        const after = prompt('После какого урока:');
        const duration = prompt('Длительность (мин):');
        const name = prompt('Название:');
        await callApiAuth('setBreak', [after, duration, name]);
        await loadBreaks();
    }

    async function addDish() {
        const name = document.getElementById('newDishName').value;
        const price = document.getElementById('newDishPrice').value;
        const desc = document.getElementById('newDishDesc').value;
        const kkal = document.getElementById('newDishKkal').value;
        const protein = document.getElementById('newDishProtein').value;
        const fat = document.getElementById('newDishFat').value;
        const carbs = document.getElementById('newDishCarbs').value;
        const date = document.getElementById('menuDate').value || new Date().toISOString().split('T')[0];
        if (!name) { alert('Введите название'); return; }
        await callApiAuth('addMenuItem', [name, price, desc, kkal, protein, fat, carbs, date]);
        await loadMenu();
        document.getElementById('newDishName').value = '';
        document.getElementById('newDishPrice').value = '';
        document.getElementById('newDishDesc').value = '';
        document.getElementById('newDishKkal').value = '';
        document.getElementById('newDishProtein').value = '';
        document.getElementById('newDishFat').value = '';
        document.getElementById('newDishCarbs').value = '';
    }

    async function editMenuItem(id) {
        const newPrice = prompt('Новая цена:');
        if (newPrice) await callApiAuth('updateMenuItem', [id, { price: newPrice }]);
        await loadMenu();
    }

    async function deleteMenuItem(id) {
        if (!confirm('Удалить блюдо?')) return;
        await callApiAuth('deleteMenuItem', [id]);
        await loadMenu();
    }

    async function updateOrderStatus(orderId, status) {
        await callApiAuth('updateOrderStatus', [orderId, status]);
        await loadOrders();
    }

    // UI helpers
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event?.target?.classList.add('active');
        
        if (tab === 'students') { loadStudents(); }
        if (tab === 'schedule') { loadSchedule(); loadBreaks(); loadLessonsByDate(); }
        if (tab === 'grades') { loadStudents(); }
        if (tab === 'canteen') { loadMenu(); loadOrders(); }
        if (tab === 'messages') { loadDialogs(); }
    }

    async function changeClass() {
        currentClassId = document.getElementById('classSelect').value;
        await loadStudents();
    }

    async function changeScheduleClass() {
        currentClassId = document.getElementById('scheduleClassSelect').value;
        await loadSchedule();
        await loadLessonsByDate();
    }

    async function changeGradesClass() {
        currentClassId = document.getElementById('gradesClassSelect').value;
        await loadStudents();
        const studentSelect = document.getElementById('studentSelect');
        studentSelect.innerHTML = '<option value="">-- Выберите ученика --</option>' + allStudents.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        currentStudentId = null;
        document.getElementById('gradesList').innerHTML = '';
    }

    // Event listeners
    document.getElementById('loginBtn').onclick = login;
    document.getElementById('logoutBtn').onclick = () => { token = null; location.reload(); };
    document.getElementById('addScheduleBtn').onclick = addSchedule;
    document.getElementById('copyScheduleBtn').onclick = copySchedule;
    document.getElementById('addBreakBtn').onclick = addBreak;
    document.getElementById('setGradeBtn').onclick = setGrade;
    document.getElementById('addDishBtn').onclick = addDish;
    document.getElementById('sendMessageBtn').onclick = sendMessageToStudent;
    document.getElementById('closeChatBtn').onclick = () => document.getElementById('chatBox').classList.add('hidden');
    document.getElementById('lessonDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('menuDate').value = new Date().toISOString().split('T')[0];
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => showTab(tab.dataset.tab);
    });

    window.openStudentChat = openStudentChat;
    window.deleteScheduleItem = deleteScheduleItem;
    window.deleteBreakItem = deleteBreakItem;
    window.editBreakItem = editBreakItem;
    window.editGradeItem = editGradeItem;
    window.deleteGradeItem = deleteGradeItem;
    window.editLessonItem = editLessonItem;
    window.editMenuItem = editMenuItem;
    window.deleteMenuItem = deleteMenuItem;
    window.updateOrderStatus = updateOrderStatus;
    window.changeClass = changeClass;
    window.changeScheduleClass = changeScheduleClass;
    window.changeGradesClass = changeGradesClass;
    window.selectStudent = selectStudent;
</script>
</body>
</html>
